include "/etc/lighttpd/mime-types.conf"
include_shell "/etc/lighttpd/ipv6.sh"

server.port            = env.PORT
server.modules         = ( "mod_alias", "mod_accesslog", "mod_cgi", "mod_setenv", "mod_expire" )
server.document-root   = "/www"
alias.url              = ( env.SUBFOLDER => "/www" )
server.indexfiles      = ("index.html")
server.follow-symlink  = "enable"
server.feature-flags  += ( "server.clock-jump-restart" => 0 )
server.max-request-field-size = 65535
accesslog.filename = "/dev/fd/3" 
cgi.assign             = ( ".cgi" => "" )
setenv.set-environment = (
  "CONFIG_EDITOR_TOKEN" => env.CONFIG_EDITOR_TOKEN
)
expire.url             = (
  "/resources/" => "access plus 365 days"
)
expire.mimetypes       = (
  "image/" => "access plus 7 days",
  "font/" => "access plus 30 days",
  "application/font-" => "access plus 30 days",
  "application/vnd.ms-fontobject" => "access plus 30 days"
)

# Avoid logging docker healthcheck request
$HTTP["remote-ip"] == "127.0.0.1" { accesslog.filename = "" }
$HTTP["remote-ip"] == "[::1]" { accesslog.filename = "" }
